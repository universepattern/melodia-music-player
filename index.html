<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MELODIA PLAYER</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<!-- jsmediatags for ID3 parsing -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
</head>
<body>

<div class="bg" id="bg"></div>
<div class="night-scene" id="nightScene">
  <div class="stars stars1"></div>
  <div class="stars stars2"></div>
  <div class="stars stars3"></div>
</div>
<div class="bg-blur" id="bgBlur"></div>
<div class="bg-grain"></div>
<div class="bg-vig"></div>
<div class="petals" id="petals"></div>
<div class="drop-ring" id="dropRing">✦ drop files or folders ✦</div>

<div class="stage" id="stage">

  <!-- ── PLAYER CARD ── -->
  <div class="card" id="card">
    <div class="card-header">
      <button class="icon-btn" id="themeBtn" title="Change Theme">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a10 10 0 0 1 10 10"></path></svg>
      </button>
      <button class="icon-btn" id="miniBtn" title="Toggle Mini Player">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      </button>
    </div>

    <!-- OIL DISC -->
    <div class="disc-section">
      <div class="disc-wrap">
        <div class="disc-halo" id="discHalo"></div>
        <div class="disc-ring">
          <canvas id="oilCanvas" width="280" height="280"></canvas>
        </div>
        <div class="disc-pin" id="discPin"></div>
        <div class="needle" id="needle">
          <div class="needle-ball"></div>
          <div class="needle-arm"></div>
        </div>
      </div>
    </div>

    <!-- TRACK INFO -->
    <div class="track-info">
      <div class="track-name idle" id="tName">drop your music ♪</div>
      <div class="track-sub">
        <span id="tArtist">melodia player</span>
        <span class="fmt-badge" id="tFmt">MP3</span>
      </div>
    </div>

    <!-- WAVEFORM -->
    <div class="wave-wrap" id="waveWrap">
      <canvas id="waveCanvas"></canvas>
    </div>
    <div class="time-row">
      <span class="time-val now" id="tCur">0:00</span>
      <span class="time-val"     id="tTot">0:00</span>
    </div>

    <!-- CONTROLS -->
    <div class="ctrl-row">
      <button class="ctrl" id="shuffleBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
          <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
        </svg>
      </button>
      <button class="ctrl" id="prevBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="19 20 9 12 19 4 19 20" fill="currentColor" stroke="none"/><line x1="5" y1="19" x2="5" y2="5"/>
        </svg>
      </button>
      <button class="play-btn" id="playBtn">
        <svg id="playIco" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
      <button class="ctrl" id="nextBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 4 15 12 5 20 5 4" fill="currentColor" stroke="none"/><line x1="19" y1="5" x2="19" y2="19"/>
        </svg>
      </button>
      <button class="ctrl" id="repeatBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
          <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
        </svg>
      </button>
    </div>

    <!-- VOLUME -->
    <div class="vol-row">
      <span class="vol-icon" id="muteBtn">
        <svg id="volIco" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </span>
      <input type="range" class="vol" id="volSlider" min="0" max="100" value="75">
      <span class="vol-pct" id="volPct">75%</span>
    </div>

    <!-- BOTTOM BUTTONS -->
    <div class="bottom-row">
      <button class="pill pill-folder" id="folderBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
        Folder
      </button>
      <button class="pill pill-files" id="openBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
        Files
      </button>
    </div>

    <div class="toast" id="toast"></div>
  </div>

  <!-- ── SIDEBAR QUEUE ── -->
  <div class="sidebar" id="sidebar">
    <div class="sb-head">
      <span class="sb-title">Queue</span>
      <div class="sb-meta">
        <span class="sb-count" id="sbCount">0 tracks</span>
        <button class="sb-clear" id="clearBtn" title="Clear queue">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/>
          </svg>
        </button>
      </div>
    </div>
    <ul class="queue-list" id="queueList">
      <li class="queue-empty">nothing here yet<br>open a folder or drop files ♪</li>
    </ul>
  </div>

</div>

<input type="file" id="fileInput" multiple accept=".mp3,.flac,.wav,.ogg,.aac,.m4a,.opus,.wma,.aiff,.alac">
<input type="file" id="folderInput" webkitdirectory multiple>
<audio id="audioEl"></audio>

<script src="app.js"></script>
</body>
</html>
